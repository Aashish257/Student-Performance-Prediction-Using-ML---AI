{% extends "basic.html" %}
{% block body %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card animate-fade-in" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-5">
            <div class="mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <h2 class="fw-bold mb-2">Authorized Access</h2>
            <p class="text-secondary">Sign in to the Performance Dashboard</p>
        </div>
        
        <form action="/" method="post">
            <div class="mb-4">
                <label for="uname" class="form-label text-secondary small text-uppercase fw-bold">Admin Username</label>
                <input type="text" class="form-control" name="uname" id="uname" placeholder="Enter username" required>
            </div>
            
            <div class="mb-5">
                <label for="pass" class="form-label text-secondary small text-uppercase fw-bold">Password</label>
                <input type="password" class="form-control" name="pass" id="pass" placeholder="Enter password" required>
            </div>
            
            <button class="btn btn-primary w-100 py-3 mb-4" type="submit">
                Access Dashboard
            </button>
            
            <div class="text-center">
                <p class="text-secondary small mb-0">Confidential System</p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
